stages:
  convert-md:
    cmd: uv run preprocess convert-rules-to-md mtg_rules_20260227.txt mtg_rules_20260227.md
    deps:
      - mtg_rules_20260227.txt
    outs:
      - mtg_rules_20260227.md
  chunk-md:
    cmd: uv run preprocess chunk-rules mtg_rules_20260227.md mtg_rules_20260227_chunks.json
    deps:
      - mtg_rules_20260227.md
    outs:
      - mtg_rules_20260227_chunks.json
  generate-sythetic-questions:
    cmd: uv run preprocess generate-synthetic-rule-questions mtg_rules_20260227_chunks.json mtg_rules_20260227_chunks_questions.json
    deps:
      - mtg_rules_20260227_chunks.json
    outs:
      - mtg_rules_20260227_chunks_questions.json
  train-test-split:
    foreach:
      - chunk
      - question
    do:
      cmd: >
        uv run preprocess build-rule-retrieval-ds 
        --granularity ${item} --test-ratio ${build_rule_retrieval_ds.test_ratio} --seed ${build_rule_retrieval_ds.seed} 
        mtg_rules_20260227_chunks_questions.json . mtg_rules_20260227
      params:
        - build_rule_retrieval_ds.test_ratio
        - build_rule_retrieval_ds.seed
      deps:
        - mtg_rules_20260227_chunks_questions.json
      outs:
        - mtg_rules_20260227_${item}_train.csv
        - mtg_rules_20260227_${item}_test.csv
  precompute-embeddings:
    matrix:
      model:
        - suffix: qwen3_emb_600m
          model_name: Qwen/Qwen3-Embedding-0.6B
      granularity: ["chunk", "question"]
    cmd: uv run preprocess generate-vectors -m ${item.model.model_name} mtg_rules_20260227_${item.granularity}_test.csv
    deps:
      - mtg_rules_20260227_${item.granularity}_test.csv
    outs:
      - mtg_rules_20260227_${item.granularity}_test_${item.model.suffix}.npz
